services:
  gpt-image-playground:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:80"        # 左边是服务器端口，可自行修改
    environment:
      - API_URL=https://ai.xingchai.xyz   # 改成你的 API 地址
      - ENABLE_API_PROXY=true              # 启用 API 代理，绕过 CORS
    restart: unless-stopped
